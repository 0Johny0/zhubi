name: Build & Push Docker Image

on:
  # 手动触发（GitHub 页面 Actions → Run workflow）
  workflow_dispatch:
    inputs:
      push:
        description: '是否推送镜像'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      tag:
        description: '镜像标签（留空则用 latest + sha）'
        required: false
        type: string

  # 仅 tag 推送时自动触发（如 v1.0.0）
  push:
    tags: ['v*']

env:
  IMAGE_NAME: zhubi

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: >-
          ${{
            (github.event_name == 'workflow_dispatch' && inputs.push == 'true') ||
            github.event_name == 'push'
          }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tags
        id: tags
        run: |
          OWNER="${{ github.repository_owner }}"
          IMAGE="ghcr.io/${OWNER,,}/${{ env.IMAGE_NAME }}"
          TAGS=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # 手动触发
            TAGS="${IMAGE}:latest,${IMAGE}:sha-${GITHUB_SHA::8}"
            if [ -n "${{ inputs.tag }}" ]; then
              TAGS="${TAGS},${IMAGE}:${{ inputs.tag }}"
            fi
          else
            # tag 推送触发
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAGS="${IMAGE}:latest,${IMAGE}:${VERSION}"
          fi

          echo "value=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Tags: ${TAGS}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: >-
            ${{
              (github.event_name == 'workflow_dispatch' && inputs.push == 'true') ||
              github.event_name == 'push'
            }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
