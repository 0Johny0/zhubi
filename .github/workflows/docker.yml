name: Build & Push Docker Image

on:
  workflow_dispatch:
    inputs:
      push:
        description: '推送镜像'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      tag:
        description: '自定义标签（可选）'
        required: false
        type: string

  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: >-
          ${{
            (github.event_name == 'workflow_dispatch' && inputs.push == 'true') ||
            github.event_name == 'push'
          }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image name and tags
        id: tags
        run: |
          # 强制小写
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER}/zhubi"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAGS="${IMAGE}:latest,${IMAGE}:sha-${GITHUB_SHA::8}"
            if [ -n "${{ inputs.tag }}" ]; then
              TAGS="${TAGS},${IMAGE}:${{ inputs.tag }}"
            fi
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAGS="${IMAGE}:latest,${IMAGE}:${VERSION}"
          fi

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Image: ${IMAGE}"
          echo "Tags:  ${TAGS}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: >-
            ${{
              (github.event_name == 'workflow_dispatch' && inputs.push == 'true') ||
              github.event_name == 'push'
            }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
